{% load static %}
<header class="header">
  <div class="header-container">
    <a href="{% url 'landing' %}" class="logo">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      MomCare
    </a>

    <form class="search-box" action="{% url 'forum' %}" method="GET" role="search">
      <input type="text" class="search-input" name="q" value="{{ search_query|default:'' }}" placeholder="Tìm kiếm bài viết" aria-label="Tìm kiếm bài viết">
      <input type="hidden" name="focus" value="posts">
    </form>

    <nav class="nav-menu">
      <a href="{% url 'landing' %}" class="nav-link {% if request.resolver_match.url_name == 'landing' %}active{% endif %}">Trang chủ</a>
      <a href="{% url 'forum' %}" class="nav-link {% if request.resolver_match.url_name == 'forum' or request.resolver_match.url_name == 'post_detail' or request.resolver_match.url_name == 'verify_post' or request.resolver_match.url_name == 'unverify_post' or request.resolver_match.url_name == 'profile' or request.resolver_match.url_name == 'profile_view' or request.resolver_match.url_name == 'profile_info' or request.resolver_match.url_name == 'notifications' or request.resolver_match.url_name == 'notification_detail' %}active{% endif %}">Diễn đàn</a>
    </nav>

    <div class="header-actions">
      <div id="auth-buttons" class="auth-buttons">
        <button class="btn-login" data-modal="auth-modal">Đăng nhập</button>
      </div>

      <div id="user-menu" class="user-menu" style="display: none;">
        <button class="icon-btn" id="notification-btn" title="Thông báo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          {% if unread_count %}<span class="notification-badge">{{ unread_count }}</span>{% endif %}
        </button>

        <div class="user-dropdown">
          <button class="user-avatar-btn" id="user-avatar-btn">
            <div class="user-avatar" id="user-avatar-display">M</div>
          </button>
          <div class="dropdown-menu" id="dropdown-menu">
            <div class="dropdown-user-info">
              <div class="dropdown-avatar" id="dropdown-avatar-display">M</div>
              <div class="dropdown-user-name" id="user-name-display">Minh Anh</div>
            </div>
            <div class="dropdown-divider"></div>
            {% if request.user.is_superuser %}
            <a href="/admin/" class="dropdown-item" id="profile-menu-link">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <span id="profile-menu-label">Trang quản trị</span>
            </a>
            {% elif request.user.is_staff %}
            <a href="/admin-panel/" class="dropdown-item" id="profile-menu-link">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <span id="profile-menu-label">Trang quản trị</span>
            </a>
            {% else %}
            <a href="{% url 'profile' %}" class="dropdown-item" id="profile-menu-link">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <span id="profile-menu-label">Trang cá nhân</span>
            </a>
            {% endif %}
            <div class="dropdown-divider"></div>
            <a href="#" class="dropdown-item logout-item" id="logout-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Đăng xuất
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<link rel="stylesheet" href="{% static 'css/ai-chatbox.css' %}?v=20260426c">

<div id="ai-chatbox-root" class="ai-chatbox-root" aria-live="polite">
  <button id="ai-chat-toggle" class="ai-chat-toggle" type="button" aria-expanded="false" aria-controls="ai-chat-panel" aria-label="Mở trợ lý AI">
    <span class="ai-chat-toggle-dot" aria-hidden="true"></span>
    <span class="ai-chat-toggle-text">Tư vấn AI</span>
  </button>

  <div id="ai-chat-backdrop" class="ai-chat-backdrop" hidden></div>

  <section id="ai-chat-panel" class="ai-chat-panel" hidden aria-hidden="true">
    <header class="ai-chat-head">
      <div class="ai-chat-title-wrap">
        <h3>Trợ lý MomCare AI</h3>
        <p>Tư vấn nhanh về mẹ và bé</p>
      </div>
      <div class="ai-chat-head-actions">
        <button id="ai-chat-refresh" class="ai-chat-icon-btn" type="button" aria-label="Làm mới đoạn chat" title="Làm mới đoạn chat">↺</button>
        <button id="ai-chat-close" class="ai-chat-icon-btn" type="button" aria-label="Đóng chatbox" title="Đóng chatbox">✕</button>
      </div>
    </header>

    <div id="ai-chat-messages" class="ai-chat-messages" role="log" aria-live="polite" aria-relevant="additions"></div>

    <div class="ai-chat-foot">

      <form id="ai-chat-form" class="ai-chat-form">
        <textarea id="ai-chat-input" class="ai-chat-input" rows="1" placeholder="Nhập câu hỏi của bạn..." required></textarea>
        <button id="ai-chat-send" class="ai-chat-send" type="submit">Gửi</button>
      </form>
    </div>
  </section>
</div>

<script src="{% static 'js/ai-chatbox.js' %}?v=20260426c"></script>
