{% load static %}<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt lại mật khẩu thành công - MomCare</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <style>
    body {
      background: linear-gradient(135deg, #f5d8e4 0%, #fce4ec 100%);
      min-height: 100vh;
      margin: 0;
    }
    .forgot-main {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px 50px;
    }
    .success-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(201, 80, 127, 0.15);
      max-width: 500px;
      width: 100%;
      text-align: center;
      padding: 60px 40px;
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      font-size: 40px;
    }
    .success-title {
      font-size: 28px;
      font-weight: 700;
      color: #333;
      margin-bottom: 10px;
    }
    .success-message {
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .btn-primary {
      display: inline-block;
      background: linear-gradient(135deg, #c9507f 0%, #d46d92 100%);
      color: white;
      padding: 14px 40px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  {% include '_navbar.html' %}

  {% include '_notification_popup.html' %}

  <main class="forgot-main">
  <div class="success-container">
    <div class="success-icon">✓</div>
    <h1 class="success-title">Đặt lại mật khẩu thành công!</h1>
    <p class="success-message">
      Mật khẩu của bạn đã được thay đổi.<br>
      Vui lòng đăng nhập với mật khẩu mới.
    </p>
    <a href="{% url 'forum' %}" class="btn-primary">Đăng nhập</a>
  </div>
  </main>

  {% include 'footer.html' %}

  <script src="{% static 'js/utilities.js' %}?v=20260408a"></script>
  <script src="{% static 'js/auth.js' %}?v=20260502a"></script>
</body>
</html>
