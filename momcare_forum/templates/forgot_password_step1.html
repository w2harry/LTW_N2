{% load static %}<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên mật khẩu - MomCare</title>
  <link rel="stylesheet" href="{% static 'css/auth.css' %}?v=20260407a">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <style>
    body {
      background: linear-gradient(135deg, #f5d8e4 0%, #fce4ec 100%);
      min-height: 100vh;
      margin: 0;
    }
    .forgot-main {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px 50px;
    }
    .register-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(201, 80, 127, 0.15);
      max-width: 500px;
      width: 100%;
    }
    .register-header {
      background: linear-gradient(135deg, #c9507f 0%, #d46d92 100%);
      padding: 40px 30px;
      text-align: center;
      color: white;
    }
    .register-header h1 {
      font-size: 28px;
      margin: 0 0 10px;
      font-weight: 700;
    }
    .register-header p {
      margin: 0;
      opacity: 0.9;
      font-size: 14px;
    }
    .register-content {
      padding: 40px 30px;
    }
    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  {% include '_navbar.html' %}

  {% include '_notification_popup.html' %}

  <main class="forgot-main">
  <div class="register-container">
    <div class="register-header">
      <h1>Quên mật khẩu</h1>
      <p>Nhập email của bạn để nhận mã xác minh</p>
    </div>

    <div class="register-content">
      {% if error %}
        <div class="error-message">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{% url 'forgot_password_step1' %}">
        {% csrf_token %}
        
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-input" placeholder="Nhập email tài khoản" required autofocus>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; padding: 12px; font-size: 16px;">Gửi mã xác minh</button>

        <p style="text-align: center; margin-top: 20px; color: #666; font-size: 14px;">
          Nhớ mật khẩu? <a href="{% url 'forum' %}" style="color: #c9507f; text-decoration: none; font-weight: 600;">Đăng nhập</a>
        </p>
      </form>
    </div>
  </div>

  </main>

  {% include 'footer.html' %}

  <script src="{% static 'js/utilities.js' %}?v=20260408a"></script>
  <script src="{% static 'js/auth.js' %}?v=20260502a"></script>
</body>
</html>
