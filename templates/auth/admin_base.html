{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MomCare Admin{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="{% static 'css/admin_panel.css' %}">
</head>
<body>
  <header class="header">
    <div class="header-container">
      <a href="{% url 'admin_dashboard' %}" class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        MomCare
      </a>

      <div class="search-box">
        <input type="text" class="search-input" placeholder="Tìm kiếm bài viết">
      </div>

      <nav class="nav-menu">
        <a href="{% url 'landing' %}" class="nav-link">Trang chủ</a>
        <a href="{% url 'forum' %}" class="nav-link">Diễn đàn</a>
      </nav>

      <div class="header-actions">
        <!-- Added id="notification-btn" to fix badge position -->
        <button class="icon-btn" id="notification-btn" type="button" title="Thông báo" aria-label="Thông báo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notification-badge">2</span>
        </button>
        <div class="user-dropdown">
          <button class="user-avatar-btn" type="button" aria-label="Tài khoản admin">
            <div class="user-avatar">A</div>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="admin-main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
