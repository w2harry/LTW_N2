<!-- Forgot Password Modal Content -->
<div class="modal-header">
  <h2 class="modal-title">Quên mật khẩu</h2>
</div>

<!-- Step 1: Email -->
<div id="forgot-password-step1" class="auth-step active">
  <div class="modal-header">
    <p class="modal-description">Nhập địa chỉ email đã đăng ký để nhận mã OTP đổi mật khẩu</p>
  </div>

  <form id="forgot-password-form-step1">
    <div class="form-group">
      <label class="form-label" for="forgot-email">Email</label>
      <input type="email" id="forgot-email" class="form-input" placeholder="Nhập email đăng ký" required>
    </div>

    <button type="submit" class="btn-primary" data-next-forgot="forgot-password-step2">Gửi OTP</button>

    <a class="back-link" onclick="closeModal(document.getElementById('forgot-password-modal')); setTimeout(() => openModal('auth-modal'), 300);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Quay lại
    </a>
  </form>
</div>

<!-- Step 2: OTP -->
<div id="forgot-password-step2" class="auth-step">
  <div class="modal-header">
    <p class="modal-description">Nhập mã OTP đã gửi về email của bạn</p>
  </div>

  <form class="verify-otp-form">
    <div class="form-group">
      <label class="form-label" for="forgot-otp">Mã OTP</label>
      <input type="text" id="forgot-otp" class="form-input otp-input" placeholder="Nhập mã OTP" maxlength="6" required>
    </div>

    <div class="otp-timer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="timer-value">01:00</span>
      <a href="#" class="resend-link disabled">Gửi lại</a>
    </div>

    <button type="submit" class="btn-primary" data-next-forgot="forgot-password-step3">Xác nhận</button>

    <a class="back-link" data-prev-forgot="forgot-password-step1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Quay lại
    </a>
  </form>
</div>

<!-- Step 3: New Password -->
<div id="forgot-password-step3" class="auth-step">
  <div class="modal-header">
    <p class="modal-description">Nhập mật khẩu mới cho tài khoản của bạn</p>
  </div>

  <form id="forgot-password-form">
    <div class="form-group">
      <label class="form-label" for="new-password">Mật khẩu mới</label>
      <div class="password-input-wrapper">
        <input type="password" id="new-password" class="form-input" placeholder="Nhập mật khẩu" required>
        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
          <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="confirm-new-password">Xác nhận mật khẩu mới</label>
      <div class="password-input-wrapper">
        <input type="password" id="confirm-new-password" class="form-input" placeholder="Nhập mật khẩu xác nhận" required>
        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
          <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-primary">Hoàn tất</button>

    <a class="auth-link" onclick="closeModal(document.getElementById('forgot-password-modal')); setTimeout(() => openModal('auth-modal'), 300);">Đăng nhập</a>

    <a class="back-link" data-prev-forgot="forgot-password-step2">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Quay lại
    </a>
  </form>
</div>
